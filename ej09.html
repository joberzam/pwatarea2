<!DOCTYPE html>
<html>

<head>
    <title>Temporizador</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #timer {
            font-size: 40px;
            margin-top: 50px;
        }
    </style>

</head>

<body>

    <h2>Cuenta regresiva</h2>

    <div id="timer">10</div>

    <script>

        let tiempo = 10;

        function cuenta() {

            let elemento = document.getElementById("timer");

            if (!elemento) return; // evita errores

            tiempo--;

            elemento.innerText = tiempo;

            if (tiempo <= 0) {
                clearInterval(intervalo);
                alert("Tiempo terminado");
            }

        }

        // Espera a que cargue la página
        window.onload = function () {
            intervalo = setInterval(cuenta, 1000);
        };

    </script>

</body>

</html>
